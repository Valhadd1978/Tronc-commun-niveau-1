<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Para-Cycling Canada — Athlete Development Pathway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a1628;
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 520px;
      padding: 48px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: #003366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo svg {
      width: 40px;
      height: 40px;
      fill: #ffffff;
    }

    h1 {
      color: #003366;
      font-size: 1.75em;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #5a7a9f;
      font-size: 1em;
      text-align: center;
      margin-bottom: 36px;
      letter-spacing: 0.3px;
    }

    .section-label {
      width: 100%;
      font-size: 0.78em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #8a9bb5;
      margin-bottom: 14px;
    }

    .athlete-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .athlete-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: #003366;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 1.05em;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      box-shadow: 0 2px 8px rgba(0,51,102,0.18);
    }

    .athlete-btn:hover {
      background: #004a99;
      box-shadow: 0 4px 16px rgba(0,51,102,0.28);
      transform: translateY(-1px);
    }

    .athlete-btn:active {
      background: #002a55;
      transform: translateY(0);
    }

    .athlete-btn .arrow {
      float: right;
      opacity: 0.6;
    }

    footer {
      margin-top: 32px;
      color: #3a5a7a;
      font-size: 0.82em;
      letter-spacing: 0.5px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
      </svg>
    </div>
    <h1>Para-Cycling Canada</h1>
    <p class="subtitle">Athlete Development Pathway</p>

    <div class="section-label">Select your profile</div>
    <div class="athlete-list">
      <button class="athlete-btn" onclick="go('Jessica_Law', 'https://view.genially.com/699624a4caa8c4e5963117c8')">
        Jessica Law <span class="arrow">›</span>
      </button>
      <button class="athlete-btn" onclick="go('Martin_Duif', 'https://view.genially.com/69a1a440708117c3604a66e6')">
        Martin Duif <span class="arrow">›</span>
      </button>
      <button class="athlete-btn" onclick="go('Alexandre_Hayward', 'https://view.genially.com/69a1a3bd456bfda5b780257e')">
        Alexandre Hayward <span class="arrow">›</span>
      </button>
      <button class="athlete-btn" onclick="go('Mike_Sametz', 'https://view.genially.com/69a1a4720b35b5efd6a66e64')">
        Mike Sametz <span class="arrow">›</span>
      </button>
      <button class="athlete-btn" onclick="go('Nathan_Clement', 'https://view.genially.com/69a986492d6cc3cc5b99bc69')">
        Nathan Clement <span class="arrow">›</span>
      </button>
      <button class="athlete-btn" onclick="go('Mel_Pemple', 'https://view.genially.com/69a1a3e88f8b47b34206f582')">
        Mel Pemple <span class="arrow">›</span>
      </button>
    </div>
  </div>

  <footer>Tronc Commun · Para-cyclisme Canada</footer>

  <script>
    function go(athleteId, url) {
      localStorage.setItem('selectedAthlete', athleteId);
      window.location.href = url;
    }
  </script>
</body>
</html>
